<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildMart Admin Panel</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-container">
        <nav class="sidebar">
            <div class="logo">
                 <h2>Build<span style="color: #fff">Mart</span></h2>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#dashboard"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="#products"><i class="fas fa-box"></i> Products</a></li>
                <li><a href="#orders"><i class="fas fa-shopping-cart"></i> Orders</a></li>
                <li><a href="#users"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="#settings"><i class="fas fa-cog"></i> Settings</a></li>
                <li class="back-to-site"><a href="/index.html"><i class="fas fa-arrow-left"></i> Go to Website</a></li>
                <li class="logout-item"><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
        <main class="main-content">
            <header>
                <div class="header-content">
                    <h1>Dashboard</h1>
                    <div class="admin-profile">
                        <span id="admin-name">Admin</span>
                        <div class="profile-dropdown">
                            <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23ccc' d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E" 
                                 alt="Admin" 
                                 id="admin-avatar">
                            <div class="dropdown-content">
                                <a href="#settings"><i class="fas fa-user-cog"></i> Profile</a>
                                <a href="#" id="header-logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a>
                            </div>
                        </div>
                    </div>
                </div>
            </header>
            
            <!-- Loading indicator -->
            <div id="loading-indicator" class="loading-overlay">
                <div class="spinner"></div>
                <p>Loading data...</p>
            </div>
            
            <div class="dashboard-stats">
                <div class="stat-card">
                    <h3><i class="fas fa-chart-line"></i> Total Sales</h3>
                    <p>₹0</p>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-shopping-cart"></i> Total Orders</h3>
                    <p>0</p>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-box"></i> Total Products</h3>
                    <p>0</p>
                </div>
                <div class="stat-card">
                    <h3><i class="fas fa-users"></i> Active Users</h3>
                    <p>0</p>
                </div>
            </div>
            
            <div class="recent-activity">
                <h2>Recent Orders</h2>
                <table class="orders-table">
                    <thead>
                        <tr>
                            <th>Order ID</th>
                            <th>Customer</th>
                            <th>Product</th>
                            <th>Amount</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Orders will be dynamically loaded here -->
                        <tr class="loading-row">
                            <td colspan="5">Loading orders...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <!-- Notification/alert system -->
    <div id="notification" class="notification">
        <span id="notification-message"></span>
        <button id="notification-close">&times;</button>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
